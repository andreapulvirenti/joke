<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ti vuoi mettere con me?</title>
  <style>
    :root {
      --ink: #22313a;
      --paper: #eef2ee;
      --paper-shadow: rgba(24, 35, 35, 0.22);
      --line: rgba(72, 112, 112, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.9), transparent 32rem),
        linear-gradient(135deg, #dbe6df 0%, #b8cbc6 45%, #e7e2d7 100%);
      color: var(--ink);
      font-family: "Comic Sans MS", "Bradley Hand ITC", "Segoe Print", cursive;
    }

    .paper {
      position: relative;
      width: min(86vw, 560px);
      aspect-ratio: 1 / 1;
      padding: clamp(42px, 9vw, 74px) clamp(28px, 7vw, 58px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(34px, 7vw, 54px);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.55), transparent 16%, rgba(126, 144, 132, 0.10) 50%, transparent 84%, rgba(255,255,255,0.5)),
        repeating-linear-gradient(
          to bottom,
          var(--paper) 0,
          var(--paper) 58px,
          var(--line) 59px,
          var(--paper) 61px
        );
      border-radius: 2px;
      box-shadow: 0 22px 52px var(--paper-shadow);
      transform: rotate(-1.4deg);
      isolation: isolate;
    }

    .paper::before,
    .paper::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .paper::before {
      background:
        radial-gradient(circle at 30% 20%, rgba(54, 69, 68, 0.08), transparent 8rem),
        radial-gradient(circle at 72% 78%, rgba(54, 69, 68, 0.07), transparent 9rem);
      filter: blur(0.3px);
    }

    .paper::after {
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(44, 62, 62, 0.05);
    }

    h1 {
      margin: 0;
      max-width: 10ch;
      text-align: center;
      font-size: clamp(2.15rem, 8vw, 4.65rem);
      line-height: 1.42;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0.8px 0.7px 0 rgba(34, 49, 58, 0.18);
      transform: rotate(1.5deg);
    }

    .choices {
      width: min(390px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      font-size: clamp(1.45rem, 5.5vw, 2.65rem);
      line-height: 1;
      text-transform: uppercase;
      transform: rotate(1.2deg);
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 0.34em;
      color: var(--ink);
      background: transparent;
      border: 0;
      padding: 14px 10px;
      font: inherit;
      text-transform: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 150ms ease;
    }

    .choice:focus-visible {
      outline: 3px solid rgba(34, 49, 58, 0.36);
      outline-offset: 4px;
      border-radius: 6px;
    }

    .choice:hover {
      transform: scale(1.08) rotate(-1deg);
    }

    .box {
      width: 0.72em;
      height: 0.72em;
      display: inline-block;
      border: 0.11em solid currentColor;
      border-radius: 0.03em;
      transform: rotate(-2deg);
      background: rgba(255, 255, 255, 0.08);
    }

    #no {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 5;
      font-size: clamp(1.45rem, 5.5vw, 2.65rem);
      line-height: 1;
      text-transform: uppercase;
      transform: translate(70px, 116px) rotate(0.8deg);
      will-change: left, top, transform;
    }

    #no.running {
      transition: left 190ms ease-out, top 190ms ease-out, transform 190ms ease-out;
    }

    .yes-message {
      position: fixed;
      inset: auto 18px 24px;
      text-align: center;
      font-family: "Segoe UI", sans-serif;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #1f3a35;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .yes-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 520px) {
      .paper {
        width: 94vw;
      }

      .choices {
        padding-inline: 6vw;
      }

      #no {
        transform: translate(50px, 108px) rotate(0.8deg);
      }
    }
  </style>
</head>
<body>
  <main class="paper" aria-label="Biglietto scritto a mano">
    <h1>Ti vuoi mettere con me?</h1>
    <div class="choices">
      <button class="choice" id="yes" type="button" aria-label="Si">
        <span class="box" aria-hidden="true"></span>
        <span>Si</span>
      </button>
    </div>
  </main>

  <button class="choice" id="no" type="button" aria-label="No">
    <span class="box" aria-hidden="true"></span>
    <span>No</span>
  </button>

  <div class="yes-message" id="message">Lo sapevo. Risposta esatta.</div>

  <script>
    const noButton = document.querySelector("#no");
    const yesButton = document.querySelector("#yes");
    const message = document.querySelector("#message");
    const dangerDistance = 72;
    let noHasRun = false;

    function randomPosition() {
      const rect = noButton.getBoundingClientRect();
      const padding = 18;
      const maxX = Math.max(padding, window.innerWidth - rect.width - padding);
      const maxY = Math.max(padding, window.innerHeight - rect.height - padding);

      return {
        x: Math.random() * (maxX - padding) + padding,
        y: Math.random() * (maxY - padding) + padding
      };
    }

    function moveNoButton() {
      const position = randomPosition();
      noHasRun = true;
      noButton.classList.add("running");
      noButton.style.left = `${position.x}px`;
      noButton.style.top = `${position.y}px`;
      noButton.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
    }

    window.addEventListener("pointermove", (event) => {
      const rect = noButton.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const distance = Math.hypot(event.clientX - centerX, event.clientY - centerY);

      if (distance < dangerDistance) {
        moveNoButton();
      }
    });

    noButton.addEventListener("pointerenter", moveNoButton);
    noButton.addEventListener("click", moveNoButton);

    yesButton.addEventListener("click", () => {
      message.classList.add("show");
      yesButton.querySelector(".box").textContent = "x";
    });

    window.addEventListener("resize", () => {
      if (noHasRun) {
        moveNoButton();
      }
    });
  </script>
</body>
</html>
